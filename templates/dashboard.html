<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8s Incident Command Center</title>
    <meta name="description" content="Kubernetes incident detection, root cause analysis, and automated remediation dashboard">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --bg-card-hover: #1f2544;
            --border-color: rgba(99, 102, 241, 0.15);
            --border-hover: rgba(99, 102, 241, 0.35);
            --text-primary: #f0f4ff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-indigo: #6366f1;
            --accent-cyan: #22d3ee;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --accent-purple: #a855f7;
            --gradient-1: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-2: linear-gradient(135deg, #22d3ee, #6366f1);
            --gradient-3: linear-gradient(135deg, #10b981, #22d3ee);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Animated Background ─── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(34, 211, 238, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        /* ─── Header ─── */
        .header {
            position: relative;
            z-index: 10;
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 26, 0.7);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f4ff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: var(--accent-emerald);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-emerald);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        .refresh-btn {
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            background: rgba(99, 102, 241, 0.08);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .refresh-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        /* ─── Main Content ─── */
        .main {
            position: relative;
            z-index: 10;
            padding: 32px 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ─── Stats Grid ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .stat-card:nth-child(1)::before { background: var(--gradient-2); }
        .stat-card:nth-child(2)::before { background: var(--accent-amber); }
        .stat-card:nth-child(3)::before { background: var(--accent-emerald); }
        .stat-card:nth-child(4)::before { background: var(--accent-rose); }
        .stat-card:nth-child(5)::before { background: var(--accent-rose); }
        .stat-card:nth-child(6)::before { background: var(--accent-amber); }
        .stat-card:nth-child(7)::before { background: var(--accent-purple); }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--border-hover);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            font-feature-settings: 'tnum';
            letter-spacing: -1px;
        }

        .stat-card:nth-child(1) .stat-value { color: var(--accent-cyan); }
        .stat-card:nth-child(2) .stat-value { color: var(--accent-amber); }
        .stat-card:nth-child(3) .stat-value { color: var(--accent-emerald); }
        .stat-card:nth-child(4) .stat-value { color: var(--accent-rose); }
        .stat-card:nth-child(5) .stat-value { color: var(--accent-rose); }
        .stat-card:nth-child(6) .stat-value { color: var(--accent-amber); }
        .stat-card:nth-child(7) .stat-value { color: var(--accent-purple); }

        /* ─── Two-Column Layout ─── */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 24px;
        }

        @media (max-width: 1100px) {
            .content-grid { grid-template-columns: 1fr; }
            .main { padding: 20px; }
            .header { padding: 16px 20px; }
        }

        /* ─── Panel ─── */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-body {
            padding: 0;
            max-height: 600px;
            overflow-y: auto;
        }

        .panel-body::-webkit-scrollbar {
            width: 6px;
        }

        .panel-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .panel-body::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 3px;
        }

        /* ─── Filter Bar ─── */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn.active, .filter-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-indigo);
            color: var(--text-primary);
        }

        /* ─── Incident List ─── */
        .incident-item {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.06);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .incident-item:hover {
            background: var(--bg-card-hover);
        }

        .incident-item.active {
            background: rgba(99, 102, 241, 0.08);
            border-left: 3px solid var(--accent-indigo);
        }

        .severity-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .severity-critical { background: var(--accent-rose); box-shadow: 0 0 8px rgba(244, 63, 94, 0.5); }
        .severity-high { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
        .severity-medium { background: var(--accent-amber); box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
        .severity-low { background: var(--accent-cyan); }
        .severity-info { background: var(--text-muted); }

        .incident-content { flex: 1; min-width: 0; }

        .incident-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .incident-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .meta-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
        }

        .meta-tag.ns {
            background: rgba(99, 102, 241, 0.12);
            color: var(--accent-indigo);
        }

        .status-tag {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-detected { background: rgba(245, 158, 11, 0.12); color: var(--accent-amber); }
        .status-validating, .status-analyzing { background: rgba(99, 102, 241, 0.12); color: var(--accent-indigo); }
        .status-remediating, .status-monitoring { background: rgba(168, 85, 247, 0.12); color: var(--accent-purple); }
        .status-resolved { background: rgba(16, 185, 129, 0.12); color: var(--accent-emerald); }
        .status-failed { background: rgba(244, 63, 94, 0.12); color: var(--accent-rose); }

        /* ─── Detail Panel ─── */
        .detail-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            color: var(--text-muted);
            text-align: center;
        }

        .detail-empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .detail-section {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.06);
        }

        .detail-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .confidence-bar {
            width: 100%;
            height: 6px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        .confidence-high { background: var(--accent-emerald); }
        .confidence-medium { background: var(--accent-amber); }
        .confidence-low { background: var(--accent-rose); }

        .rca-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .rca-root-cause {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            padding: 14px 18px;
            background: rgba(244, 63, 94, 0.06);
            border-left: 3px solid var(--accent-rose);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-bottom: 12px;
        }

        .recommendation-list {
            list-style: none;
            padding: 0;
        }

        .recommendation-list li {
            padding: 10px 14px;
            margin-bottom: 6px;
            background: rgba(99, 102, 241, 0.04);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .recommendation-list li::before {
            content: '→';
            color: var(--accent-indigo);
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ─── Remediation Actions ─── */
        .action-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(99, 102, 241, 0.04);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(99, 102, 241, 0.06);
        }

        .action-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .action-type {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .action-command {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            color: var(--accent-cyan);
            overflow-x: auto;
            margin-top: 6px;
        }

        .remediate-btn {
            padding: 10px 24px;
            border-radius: 100px;
            border: none;
            background: var(--gradient-1);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .remediate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.4);
        }

        .remediate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── Loading ─── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(99, 102, 241, 0.15);
            border-top-color: var(--accent-indigo);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Empty state ─── */
        .empty-state {
            padding: 60px 40px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 16px;
        }

        /* ─── Fade in animation ─── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.4s ease forwards;
        }
    </style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
    <div class="header-left">
        <div class="logo-icon">⎈</div>
        <h1>K8s Incident <span>Command Center</span></h1>
    </div>
    <div class="header-right">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="agent-status">Agent Active</span>
        </div>
        <button class="refresh-btn" onclick="refreshAll()">⟳ Refresh</button>
    </div>
</header>

<!-- ─── Main Content ─── -->
<main class="main">

    <!-- Stats Row -->
    <div class="stats-grid" id="stats-grid">
        <div class="stat-card animate-in">
            <div class="stat-label">Total Incidents</div>
            <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card animate-in" style="animation-delay:0.05s">
            <div class="stat-label">Active</div>
            <div class="stat-value" id="stat-active">—</div>
        </div>
        <div class="stat-card animate-in" style="animation-delay:0.1s">
            <div class="stat-label">Resolved</div>
            <div class="stat-value" id="stat-resolved">—</div>
        </div>
        <div class="stat-card animate-in" style="animation-delay:0.15s">
            <div class="stat-label">Failed</div>
            <div class="stat-value" id="stat-failed">—</div>
        </div>
        <div class="stat-card animate-in" style="animation-delay:0.2s">
            <div class="stat-label">Critical</div>
            <div class="stat-value" id="stat-critical">—</div>
        </div>
        <div class="stat-card animate-in" style="animation-delay:0.25s">
            <div class="stat-label">High</div>
            <div class="stat-value" id="stat-high">—</div>
        </div>
        <div class="stat-card animate-in" style="animation-delay:0.3s">
            <div class="stat-label">Avg Confidence</div>
            <div class="stat-value" id="stat-confidence">—</div>
        </div>
    </div>

    <!-- Two Column Layout -->
    <div class="content-grid">

        <!-- Left: Incident List -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">🚨 Incidents</div>
                <span id="incident-count" style="font-size:12px; color:var(--text-muted)"></span>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all" onclick="filterIncidents('all', this)">All</button>
                <button class="filter-btn" data-filter="critical" onclick="filterIncidents('critical', this)">Critical</button>
                <button class="filter-btn" data-filter="high" onclick="filterIncidents('high', this)">High</button>
                <button class="filter-btn" data-filter="medium" onclick="filterIncidents('medium', this)">Medium</button>
                <button class="filter-btn" data-filter="resolved" onclick="filterIncidents('resolved', this)">Resolved</button>
                <button class="filter-btn" data-filter="failed" onclick="filterIncidents('failed', this)">Failed</button>
            </div>
            <div class="panel-body" id="incident-list">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading incidents...
                </div>
            </div>
        </div>

        <!-- Right: Detail Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">📋 Incident Detail</div>
            </div>
            <div class="panel-body" id="detail-panel" style="max-height: 700px;">
                <div class="detail-empty">
                    <div class="detail-empty-icon">🔍</div>
                    <p>Select an incident to view details</p>
                    <p style="font-size: 12px; margin-top: 8px;">Click on any incident from the list</p>
                </div>
            </div>
        </div>

    </div>
</main>

<script>
    let allIncidents = [];
    let currentFilter = 'all';
    let selectedIncidentId = null;

    // ─── Fetch Stats ───
    async function fetchStats() {
        try {
            const res = await fetch('/api/dashboard/stats');
            const stats = await res.json();
            document.getElementById('stat-total').textContent = stats.total_incidents;
            document.getElementById('stat-active').textContent = stats.active_incidents;
            document.getElementById('stat-resolved').textContent = stats.resolved_incidents;
            document.getElementById('stat-failed').textContent = stats.failed_incidents;
            document.getElementById('stat-critical').textContent = stats.critical_count;
            document.getElementById('stat-high').textContent = stats.high_count;
            document.getElementById('stat-confidence').textContent =
                stats.avg_confidence > 0 ? (stats.avg_confidence * 100).toFixed(0) + '%' : '—';
        } catch (e) {
            console.error('Failed to fetch stats:', e);
        }
    }

    // ─── Fetch Incidents ───
    async function fetchIncidents() {
        try {
            const res = await fetch('/api/incidents?limit=100');
            allIncidents = await res.json();
            renderIncidents();
        } catch (e) {
            document.getElementById('incident-list').innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Failed to load incidents</p></div>';
        }
    }

    // ─── Render Incidents ───
    function renderIncidents() {
        const list = document.getElementById('incident-list');
        let filtered = allIncidents;

        if (currentFilter !== 'all') {
            if (['critical', 'high', 'medium', 'low', 'info'].includes(currentFilter)) {
                filtered = allIncidents.filter(i => i.severity === currentFilter);
            } else {
                filtered = allIncidents.filter(i => i.status === currentFilter);
            }
        }

        document.getElementById('incident-count').textContent = `${filtered.length} incidents`;

        if (filtered.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">✨</div>
                    <p>No incidents found</p>
                    <p style="font-size:12px;margin-top:8px;color:var(--text-muted)">
                        ${currentFilter === 'all' ? 'Your cluster looks healthy!' : 'Try a different filter'}
                    </p>
                </div>`;
            return;
        }

        list.innerHTML = filtered.map((inc, i) => `
            <div class="incident-item ${selectedIncidentId === inc.id ? 'active' : ''} animate-in"
                 style="animation-delay:${i * 0.03}s"
                 onclick="selectIncident(${inc.id})">
                <div class="severity-indicator severity-${inc.severity}"></div>
                <div class="incident-content">
                    <div class="incident-title">${escapeHtml(inc.title)}</div>
                    <div class="incident-meta">
                        <span class="meta-tag ns">${inc.namespace}</span>
                        <span class="status-tag status-${inc.status}">${inc.status}</span>
                        <span>${timeAgo(inc.detected_at)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ─── Select Incident ───
    async function selectIncident(id) {
        selectedIncidentId = id;
        renderIncidents();

        const panel = document.getElementById('detail-panel');
        panel.innerHTML = '<div class="loading"><div class="spinner"></div>Loading details...</div>';

        try {
            const res = await fetch(`/api/incidents/${id}`);
            const data = await res.json();
            renderDetail(data);
        } catch (e) {
            panel.innerHTML = '<div class="empty-state"><p>Failed to load details</p></div>';
        }
    }

    // ─── Render Detail ───
    function renderDetail(data) {
        const panel = document.getElementById('detail-panel');
        const inc = data.incident;
        const rca = data.rca_reports[0];
        const actions = data.remediation_actions;

        let html = `
            <div class="detail-header animate-in">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                    <div class="severity-indicator severity-${inc.severity}"></div>
                    <span class="status-tag status-${inc.status}">${inc.status}</span>
                    <span style="font-size:12px;color:var(--text-muted)">ID #${inc.id}</span>
                </div>
                <h2>${escapeHtml(inc.title)}</h2>
                <div class="incident-meta" style="margin-top:8px;">
                    <span class="meta-tag ns">${inc.namespace}</span>
                    <span>${inc.resource_type || ''} / ${inc.resource_name || ''}</span>
                    <span>${timeAgo(inc.detected_at)}</span>
                </div>
            </div>`;

        // RCA Section
        if (rca) {
            const confPct = (rca.confidence_score * 100).toFixed(0);
            const confClass = rca.confidence_score >= 0.7 ? 'high' : rca.confidence_score >= 0.4 ? 'medium' : 'low';

            html += `
                <div class="detail-section animate-in" style="animation-delay:0.1s">
                    <div class="detail-section-title">🧠 Root Cause Analysis
                        <span style="margin-left:auto;font-size:12px;font-weight:500;color:var(--text-secondary)">
                            Confidence: ${confPct}%
                        </span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill confidence-${confClass}" style="width:${confPct}%"></div>
                    </div>
                    <div style="margin-top:16px">
                        <div class="rca-root-cause">${escapeHtml(rca.root_cause)}</div>
                    </div>
                    <div class="rca-text" style="margin-top:12px">${escapeHtml(rca.analysis || '')}</div>
                </div>`;

            // Recommendations
            if (rca.recommendations && rca.recommendations.length > 0) {
                html += `
                    <div class="detail-section animate-in" style="animation-delay:0.2s">
                        <div class="detail-section-title">💡 Recommendations</div>
                        <ul class="recommendation-list">
                            ${rca.recommendations.map(r => `<li>${escapeHtml(r)}</li>`).join('')}
                        </ul>
                    </div>`;
            }
        } else {
            html += `
                <div class="detail-section">
                    <div class="detail-section-title">🧠 Root Cause Analysis</div>
                    <p style="color:var(--text-muted);font-size:13px">No RCA generated yet.</p>
                </div>`;
        }

        // Remediation Actions
        html += `
            <div class="detail-section animate-in" style="animation-delay:0.3s">
                <div class="detail-section-title">🔧 Remediation Actions</div>`;

        if (actions.length > 0) {
            html += actions.map(a => `
                <div class="action-item">
                    <div class="action-header">
                        <span class="action-type">${escapeHtml(a.action_type || 'Unknown')}</span>
                        <span class="status-tag status-${a.status === 'success' ? 'resolved' : a.status === 'failed' ? 'failed' : 'analyzing'}">${a.status}</span>
                    </div>
                    ${a.command ? `<div class="action-command">$ ${escapeHtml(a.command)}</div>` : ''}
                    ${a.result ? `<p style="font-size:12px;color:var(--text-muted);margin-top:6px">${escapeHtml(a.result)}</p>` : ''}
                </div>
            `).join('');
        } else {
            html += '<p style="color:var(--text-muted);font-size:13px">No remediation actions taken.</p>';
        }

        // Manual remediation button
        if (inc.status !== 'resolved' && rca) {
            html += `
                <div style="margin-top:16px;text-align:right">
                    <button class="remediate-btn" onclick="triggerRemediation(${inc.id})" id="remediate-btn-${inc.id}">
                        ⚡ Trigger Remediation
                    </button>
                </div>`;
        }

        html += '</div>';

        panel.innerHTML = html;
    }

    // ─── Trigger Remediation ───
    async function triggerRemediation(id) {
        const btn = document.getElementById(`remediate-btn-${id}`);
        if (btn) {
            btn.disabled = true;
            btn.textContent = '⏳ Executing...';
        }

        try {
            const res = await fetch(`/api/incidents/${id}/remediate`, { method: 'POST' });
            const data = await res.json();

            if (data.status === 'success') {
                alert('✅ Remediation executed successfully!');
            } else if (data.status === 'no_action') {
                alert('ℹ️ No matching remediation rule found.');
            }

            // Refresh
            await selectIncident(id);
            await fetchStats();
        } catch (e) {
            alert('❌ Remediation failed: ' + e.message);
            if (btn) {
                btn.disabled = false;
                btn.textContent = '⚡ Trigger Remediation';
            }
        }
    }

    // ─── Filter ───
    function filterIncidents(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderIncidents();
    }

    // ─── Refresh All ───
    async function refreshAll() {
        await Promise.all([fetchStats(), fetchIncidents()]);
        if (selectedIncidentId) {
            await selectIncident(selectedIncidentId);
        }
    }

    // ─── Helpers ───
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function timeAgo(dateStr) {
        if (!dateStr) return '';
        const now = new Date();
        const date = new Date(dateStr);
        const seconds = Math.floor((now - date) / 1000);

        if (seconds < 60) return 'just now';
        if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
        if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
        return Math.floor(seconds / 86400) + 'd ago';
    }

    // ─── Initial Load ───
    fetchStats();
    fetchIncidents();

    // Auto-refresh every 30 seconds
    setInterval(() => {
        fetchStats();
        fetchIncidents();
    }, 30000);
</script>

</body>
</html>
